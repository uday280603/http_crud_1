
  <div class="row" *ngIf="postObj">
    <div class="col-md-8 offset-md-2">
      <div class="card">
        <div class="card-header">{{ postObj.title }}</div>
        <div class="card-body">{{ postObj.body }}</div>
        <div class="card-footer d-flex justify-content-between">
          <button mat-raised-button color="primary" routerLink="edit">Edit</button>
          <button mat-raised-button color="warn" (click)="onRemove()">Remove</button>
        </div>
      </div>
    </div>
  </div>
